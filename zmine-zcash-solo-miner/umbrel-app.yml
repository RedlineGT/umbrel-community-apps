  - https://raw.githubusercontent.com/RedlineGT/umbrel-community-apps/main/zmine-zcash-solo-miner/screenshot1.png
  - https://raw.githubusercontent.com/RedlineGT/umbrel-community-apps/main/zmine-zcash-solo-miner/screenshot2.png
releaseNotes: >-
  v1.2.0 — Major dashboard redesign


  • New sidebar navigation layout (Overview, Miners, Blocks Found, Donate)
  with collapsible sidebar and hamburger toggle

  • Switched to Inter font (Google Fonts) for a modern, clean UI

  • OLED dark theme preserved (#000 background) with refined card system
  and consistent color variables

  • ZEC price ticker with live 90-day sparkline chart and high/low range

  • Block odds calculator — daily/monthly chance, closest share ever,
  pool vs network hashrate

  • Improved stat cards grid with auto-fit layout

  • Responsive design: sidebar collapses on tablet, slides in on mobile

  • Zebra healthcheck tuned (start_period 300s, retries 30) for slow
  hardware syncing large chains

  • SVG favicon and donate section polish


  Changelog:

  v1.0.9 — Fix Edit address button (window.openAddrDialog), add SVG favicon

  v1.0.8 — Zebra healthcheck: start_period 300s, retries 30

  v1.0.7 — Donate section copy update

  v1.0.6 — ZEC price ticker, 90-day chart, block odds panel, CSP fix

  v1.0.5 — Fix hashrate card flash on zero pool hash

  v1.0.4 — Inline QR code library (offline-safe), fix QR API

  v1.0.0 — Initial release. Zebra v5+ (NU6.2), s-nomp zebra-mining branch,
  nheqminer CPU tromp solver. Mainnet only.

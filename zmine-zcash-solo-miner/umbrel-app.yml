manifestVersion: 1.1
id: zmine-zcash-solo-miner
name: Zcash Solo Miner
tagline: Mine ZEC on mainnet with your own Zebra full node
icon: https://raw.githubusercontent.com/RedlineGT/umbrel-community-apps/main/zmine-zcash-solo-miner/icon.png
category: Finance
version: "1.3.31"
port: 3300
description: >-
  A complete, self-contained Zcash solo mining stack running entirely on your
  Umbrel — no third-party pools, no fees, full sovereignty over your mining
  operation.


  DASHBOARD

  • OLED dark-themed live dashboard with collapsible sidebar navigation

  • Real-time clock, network status, and live chain sync progress bar

  • Stratum card with animated breathing glow — gold while syncing, green
  when fully synced — showing live connected peer count


  NETWORK & DIFFICULTY

  • Network vs Your Fleet comparison panel — side-by-side network difficulty
  and hashrate against your fleet, with live updates

  • 90-day network difficulty chart with historical comparison and next
  retarget projection

  • Share cadence section — fleet average share submission interval and
  fastest miner highlight


  WORKERS & HASHRATE

  • Real-time fleet hashrate, active worker count, and Zebra peer count

  • Per-worker stats table: hashrate, difficulty, session best share,
  all-time best share, submitted count, rejected count, rejection %, average
  share interval, and last share time

  • Stratum connection latency panel — TCP round-trip time per connected IP


  BLOCKS & ODDS

  • Estimated time to block card with daily and monthly win probability

  • Blocks found counter with large display, pending confirmation count, and
  your mining reward address

  • Halving countdown with current block subsidy

  • Fleet best share ever achieved, with the miner name that set it

  • Complete block history with confirmation status and coinbase TX hashes


  PRICE & NEWS

  • ZEC/USD price ticker with 90-day sparkline chart, high/low range, and
  price drop alert

  • Rolling ZEC news ticker — last 14 days of headlines from CoinDesk, The
  Block, and Decrypt — each headline clickable


  SETUP & CONTROLS

  • Stratum endpoint banner with one-click copy for pointing ASICs or GPU
  rigs directly at your node

  • Mining address management — set or update your reward address from the
  dashboard without editing config files

  • Mainnet / Testnet toggle with persistent network flag

  • Umbrel home screen widget showing Pool Hashrate, Blocks Found, Net
  Difficulty, and Active Workers at a glance

  • Donate section with BTC, ZEC, and BCH QR codes


  All block rewards go directly to your configured Zcash transparent address
  (t1/t3). Payment processing is fully disabled — no pool operator cut.

  Point external GPU or ASIC miners at your Umbrel's Stratum port (13333)
  for the best chance of finding blocks. The built-in CPU miner is included
  for connectivity testing.

  Initial mainnet chain sync takes 2–3 days depending on your hardware.


  Powered by open-source software:

  • Zebra v5+ by Zcash Foundation — Rust-based Zcash full node
  (github.com/ZcashFoundation/zebra)

  • s-nomp zebra-mining branch by Zcash Foundation — Stratum pool server
  (github.com/ZcashFoundation/s-nomp)

  • nheqminer by nicehash — CPU Equihash 200,9 solver (Tromp algorithm)
  (github.com/nicehash/nheqminer)

  • Redis — in-memory data store for pool state (redis.io)


manifestVersion: 1
id: redlinegt-wire-pod
name: Wire Pod
tagline: Vector robot voice command server
icon: https://raw.githubusercontent.com/RedlineGT/umbrel-community-apps/main/redlinegt-wire-pod/icon.png
category: robotics
version: "1.0.1"
port: 8080
description: >-
  Wire Pod is a free, fully-featured server software for the Anki Vector robot, originally created by kercre123.

  It allows voice commands to work with any Vector 1.0 or 2.0 for no fee, including regular production robots.

  Features:
  - Full voice command support
  - Web interface for configuration
  - Localization and multiple language support
  - Plugin system for extending functionality
  - Bluetooth LE support (optional)
  - Multiple STT service options (Vosk, PicoVoice, etc.)

  Original Project: https://github.com/kercre123/wire-pod (MIT License)

developer: kercre123
